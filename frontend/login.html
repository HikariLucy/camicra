<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cami CRA - Iniciar Sesión</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md border border-gray-200">
        <div class="text-center mb-8">
            <img src="app_icon.png" alt="Cami CRA" class="mx-auto h-20 w-auto mb-4 rounded-xl shadow-sm border border-gray-100">
            <p class="text-gray-500">Sistema de Gestión de Biblioteca</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label for="username" class="block text-sm font-medium text-gray-700">Usuario</label>
                <input type="text" id="username" class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500" required>
            </div>
            
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700">Contraseña</label>
                <input type="password" id="password" class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500" required>
            </div>

            <div id="error-msg" class="text-red-500 text-sm text-center hidden">
                Credenciales incorrectas.
            </div>

            <button type="submit" class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-900 hover:bg-blue-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition">
                Ingresar
            </button>
        </form>

        <div class="mt-6 text-center text-xs text-gray-400">
            <p>Acceso seguro Cami CRA &copy; 2026</p>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://127.0.0.1:8088/api';

        // Redirigir al home si ya está logueado
        if (localStorage.getItem('jwt_token')) {
            window.location.href = 'index.html';
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorMsg = document.getElementById('error-msg');
            
            try {
                const response = await fetch(`${API_BASE_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (!response.ok) {
                    throw new Error('Credenciales incorrectas');
                }

                const data = await response.json();
                localStorage.setItem('jwt_token', data.token);
                localStorage.setItem('username', data.username);
                
                // Redirigir a la app principal
                window.location.href = 'index.html';
                
            } catch (error) {
                errorMsg.classList.remove('hidden');
                errorMsg.innerText = error.message;
            }
        });
    </script>
</body>
</html>
